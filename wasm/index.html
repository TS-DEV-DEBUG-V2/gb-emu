<!doctype html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 100%;
        height: 100%;
        background: #111;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      canvas#canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #000;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    <script type="text/javascript">
      var GB_W = 160;
      var GB_H = 144;
      var canvasElement = document.getElementById('canvas');

      function resizeCanvas() {
        var vw = window.innerWidth;
        var vh = window.innerHeight;
        var scale = Math.floor(Math.min(vw / GB_W, vh / GB_H));
        if (scale < 1) scale = 1;
        canvasElement.style.width = (GB_W * scale) + 'px';
        canvasElement.style.height = (GB_H * scale) + 'px';
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      window.romurl = window.romurl || 'test.gb';
      var Module = {
        arguments: ['rom.gb'],
        canvas: canvasElement,
        print: function() {
          console.log(Array.prototype.join.call(arguments, ' '));
        },
        preRun: [function() {
          var xhr = new XMLHttpRequest();
          xhr.open('GET', window.romurl, false);
          xhr.overrideMimeType('text/plain; charset=x-user-defined');
          xhr.send(null);
          if (xhr.status === 200 || xhr.status === 0) {
            var data = new Uint8Array(xhr.responseText.length);
            for (var i = 0; i < data.length; i++) data[i] = xhr.responseText.charCodeAt(i) & 0xFF;
            FS.writeFile('rom.gb', data);
          }
        }]
      };
    </script>
    <script async type="text/javascript" src="gbemu.js"></script>
  </body>
</html>
